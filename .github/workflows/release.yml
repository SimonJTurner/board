name: Build releases

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build and publish binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-go@cd53bc84d5e2fd85362f4cb840513e06427082d3  # v4.2.0
        with:
          go-version: 1.24
      - name: Run tests
        run: go test ./...
      - name: Build assets
        run: |
          set -euo pipefail
          combos=(
            "linux amd64"
            "linux arm64"
            "darwin amd64"
            "darwin arm64"
            "windows amd64"
          )
          for combo in "${combos[@]}"; do
            set -- $combo
            export GOOS=$1
            export GOARCH=$2
            go build -o "board-${GOOS}-${GOARCH}" ./cmd/board
            if [ "$GOOS" = "windows" ]; then
              mv "board-${GOOS}-${GOARCH}" "board-${GOOS}-${GOARCH}.exe"
            fi
          done
      - name: Publish release assets
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844  # v1
        with:
          generate_release_notes: true
          files: |
            board-linux-amd64
            board-linux-arm64
            board-darwin-amd64
            board-darwin-arm64
            board-windows-amd64.exe
