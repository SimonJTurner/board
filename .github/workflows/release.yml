name: Build releases

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build and publish binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v4
        with:
          go-version: 1.24
      - name: Run tests
        run: go test ./...
      - name: Build assets
        run: |
          set -euo pipefail
          combos=(
            "linux amd64"
            "linux arm64"
            "darwin amd64"
            "darwin arm64"
            "windows amd64"
          )
          for combo in "${combos[@]}"; do
            set -- $combo
            GOOS=$1 GOARCH=$2 go build -o "board-${GOOS}-${GOARCH}" ./cmd/board
            if [ "$GOOS" = "windows" ]; then
              mv "board-${GOOS}-${GOARCH}" "board-${GOOS}-${GOARCH}.exe"
            fi
          done
      - name: Publish release assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            board-linux-amd64
            board-linux-arm64
            board-darwin-amd64
            board-darwin-arm64
            board-windows-amd64.exe
